<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XINAOSurface</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="shell">
    <header class="titlebar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <div class="brand-title">XINAO Surface</div>
          <div class="brand-subtitle">材质样板</div>
        </div>
      </div>
      <div class="window-actions">
        <button class="window-button" data-window="minimize" aria-label="最小化"></button>
        <button class="window-button maximize" data-window="maximize" aria-label="最大化"></button>
        <button class="window-button close" data-window="close" aria-label="关闭"></button>
      </div>
    </header>

    <main class="surface-stage">
      <section class="hero-panel">
        <div class="panel-copy">
          <p class="eyebrow">Desktop shell</p>
          <h1>壳和材质先行</h1>
          <p class="summary">独立窗口、浮起层、真实按钮状态。这里故意不接聊天、不接网页中控台。</p>
        </div>
        <div class="status-chip">
          <span class="pulse"></span>
          Prototype
        </div>
      </section>

      <section class="workspace">
        <div class="material-card primary-card">
          <div class="card-heading">
            <span>按钮触感</span>
            <span class="meter">80-150ms</span>
          </div>
          <div class="button-grid">
            <button class="app-button app-button-primary">
              <span class="button-icon"></span>
              主按钮
            </button>
            <button class="app-button app-button-secondary">
              次按钮
            </button>
            <button class="app-button app-button-secondary is-loading" aria-busy="true">
              <span class="spinner"></span>
              加载中
            </button>
            <button class="app-button app-button-disabled" disabled>
              禁用
            </button>
          </div>
        </div>

        <div class="material-card detail-card">
          <div class="card-heading">
            <span>分层</span>
            <span class="meter">base / card / pop</span>
          </div>
          <div class="layer-stack" aria-hidden="true">
            <div class="layer layer-base"></div>
            <div class="layer layer-card"></div>
            <div class="layer layer-pop"></div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="./renderer.js"></script>
</body>
</html>
