# Thin glue provider gateway — LiteLLM OpenAI-compatible on :20128
# Start: scripts/Start-XinaoThinGlueStack.ps1
services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: xinao-thin-glue-litellm
    ports:
      - "20128:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-xinao-thin-glue-local}
    volumes:
      - ./materials/thin_glue_litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s