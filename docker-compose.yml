# 信奥后台底座 V2 — 中文显示名见 materials/xinao_compose_display_names.v1.json
# 启动：docker compose up -d --build
# 或：scripts/Start-XinaoBaseCompose.ps1 -Build
name: xinao-base

services:
  shiwu-ku:
    image: postgres:16-alpine
    container_name: shiwu-ku
    labels:
      xinao.display_cn: "事务库"
      xinao.role_cn: "耐久事务PostgreSQL"
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - shiwu-ku-data:/var/lib/postgresql/data
    networks:
      - xinao_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  naijiu-shiwu:
    image: temporalio/auto-setup:1.27.2
    container_name: naijiu-shiwu
    labels:
      xinao.display_cn: "耐久事务"
      xinao.role_cn: "Temporal Server :7233"
    depends_on:
      shiwu-ku:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: shiwu-ku
    ports:
      - "7233:7233"
    networks:
      - xinao_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address naijiu-shiwu:7233"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  shiwu-mianban:
    image: temporalio/ui:2.39.0
    container_name: shiwu-mianban
    labels:
      xinao.display_cn: "事务面板"
      xinao.role_cn: "Temporal UI :8080"
    depends_on:
      naijiu-shiwu:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: naijiu-shiwu:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:8080
    ports:
      - "8080:8080"
    networks:
      - xinao_internal
    restart: unless-stopped

  xiangliang-ku:
    image: qdrant/qdrant:v1.13.2
    container_name: xiangliang-ku
    labels:
      xinao.display_cn: "向量库"
      xinao.role_cn: "Qdrant :6333"
    ports:
      - "6333:6333"
    volumes:
      - ${XINAO_EVIDENCE_HOST:-D:/XINAO_RESEARCH_RUNTIME}/state/qdrant:/qdrant/storage
    networks:
      - xinao_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  moxing-wangguan:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: moxing-wangguan
    env_file:
      - path: .env
        required: false
    labels:
      xinao.display_cn: "模型网关"
      xinao.role_cn: "LiteLLM :20128"
    depends_on:
      naijiu-shiwu:
        condition: service_started
    ports:
      - "20128:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-xinao-thin-glue-local}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    volumes:
      - ./materials/thin_glue_litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    networks:
      - xinao_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=3)\""]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  houtai-gongren:
    build:
      context: .
      dockerfile: docker/houtai-gongren/Dockerfile
    container_name: houtai-gongren
    labels:
      xinao.display_cn: "后台工人"
      xinao.role_cn: "333主路步2·波内真执行"
    depends_on:
      naijiu-shiwu:
        condition: service_started
      xiangliang-ku:
        condition: service_started
      moxing-wangguan:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      XINAO_RESEARCH_RUNTIME: /evidence
      XINAO_CODEX_S_REPO_ROOT: /app
      PYTHONPATH: /app:/app/src
      TEMPORAL_ADDRESS: naijiu-shiwu:7233
      XINAO_GATEWAY_BASE_URL: http://moxing-wangguan:4000/v1
      XINAO_PROVIDER_BASE_URL: http://moxing-wangguan:4000/v1
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-xinao-thin-glue-local}
      XINAO_QDRANT_URL: http://xiangliang-ku:6333
      XINAO_EXTERNAL_MATURE_ROOT: /external_mature/official
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      XINAO_SEARXNG_BASE_URL: ${XINAO_SEARXNG_BASE_URL:-http://waiwang-sousuo:8080}
    volumes:
      - ${XINAO_EVIDENCE_HOST:-D:/XINAO_RESEARCH_RUNTIME}:/evidence
      - ${XINAO_EXTERNAL_MATURE_HOST:-E:/XINAO_EXTERNAL_MATURE/codex_20260627/official}:/external_mature/official:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - xinao_internal
    restart: unless-stopped

  bendi-moxing:
    image: ollama/ollama:latest
    container_name: bendi-moxing
    labels:
      xinao.display_cn: "本地模型"
      xinao.role_cn: "Ollama可选"
    ports:
      - "11434:11434"
    volumes:
      - bendi-moxing-data:/root/.ollama
    networks:
      - xinao_internal
    restart: unless-stopped
    profiles:
      - ollama

  waiwang-sousuo:
    image: searxng/searxng:latest
    container_name: waiwang-sousuo
    labels:
      xinao.display_cn: "外网搜索"
      xinao.role_cn: "SearXNG可选"
    ports:
      - "8888:8080"
    networks:
      - xinao_internal
    restart: unless-stopped
    profiles:
      - search

networks:
  xinao_internal:
    name: xinao_internal

volumes:
  shiwu-ku-data:
  bendi-moxing-data: