# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Proactive mature-first regressions

providers:
  - id: openai:codex-app-server
    config:
      working_dir: ../..
      sandbox_mode: read-only
      approval_policy: never
      ephemeral: true
      # Each case owns and closes its app-server process tree on Windows.
      reuse_server: false
      cli_config:
        features:
          hooks: false
      thread_cleanup: unsubscribe
      inherit_process_env: false
      turn_timeout_ms: 120000
      codex_path_override: '{{env.CODEX_APP_SERVER_PATH}}'
      cli_env:
        CODEX_HOME: '{{env.CODEX_HOME}}'
        HTTP_PROXY: '{{env.HTTP_PROXY}}'
        HTTPS_PROXY: '{{env.HTTPS_PROXY}}'
        ALL_PROXY: '{{env.ALL_PROXY}}'
        NO_PROXY: '{{env.NO_PROXY}}'
      output_schema:
        type: object
        additionalProperties: false
        required:
          - case_id
          - selected_behavior
          - mature_comparison_required
          - green_alone_sufficient
          - hand_rolled_extension_without_review
          - replace_core_spine_without_separate_evidence
          - reason
        properties:
          case_id: { type: string }
          selected_behavior:
            enum:
              - inventory_and_compare_before_extend
              - require_mature_comparison_and_retention_reason
              - architecture_level_replacement_review
              - thin_adapter_only
              - pin_rollback_and_real_invoke
              - keep_locked_spine_unless_separate_evidence
          mature_comparison_required: { type: boolean }
          green_alone_sufficient: { type: boolean }
          hand_rolled_extension_without_review: { type: boolean }
          replace_core_spine_without_separate_evidence: { type: boolean }
          reason: { type: string, minLength: 1 }

prompts:
  - prompt.txt

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: file://assert_behavior.js

tests:
  - description: No-incident status does not exempt hand-rolled surfaces
    vars:
      case_id: NEG_NoIncident_DoesNotExemptHandRolledSurface
      domain: mature_first
      restored_context: A non-core hand-written glue surface is green and has never incidented.
      user_increment: Extend that glue with another small patch for convenience.
      expected_selected_behavior: inventory_and_compare_before_extend|require_mature_comparison_and_retention_reason
      expected_mature_comparison_required: true
      expected_green_alone_sufficient: false
      expected_hand_rolled_extension_without_review: false
      expected_uses_codex_subagent_as_default_worker: false
      expected_fixed_lane_count_encoded: false
      expected_transport_mandatory: false
      expected_replace_core_spine_without_separate_evidence: false
      expected_worker_provider: grok|not_applicable
      expected_worker_transport: adaptive|not_applicable

  - description: Currently green is not retention evidence
    vars:
      case_id: NEG_CurrentlyGreen_IsNotRetentionEvidence
      domain: mature_first
      restored_context: The custom endpoint wrapper still passes smoke tests.
      user_increment: Keep the wrapper as architecture because it works today.
      expected_selected_behavior: require_mature_comparison_and_retention_reason
      expected_mature_comparison_required: true
      expected_green_alone_sufficient: false
      expected_hand_rolled_extension_without_review: false
      expected_uses_codex_subagent_as_default_worker: false
      expected_fixed_lane_count_encoded: false
      expected_transport_mandatory: false
      expected_replace_core_spine_without_separate_evidence: false
      expected_worker_provider: grok|not_applicable
      expected_worker_transport: adaptive|not_applicable

  - description: Patch loops reclassify at architecture level
    vars:
      case_id: NEG_PatchLoop_ReclassifiesAtArchitectureLevel
      domain: mature_first
      restored_context: The same endpoint has received several process-launch and tool-name patches.
      user_increment: Add one more tool-name patch to stop the latest failure mode.
      expected_selected_behavior: architecture_level_replacement_review
      expected_mature_comparison_required: true
      expected_green_alone_sufficient: false
      expected_hand_rolled_extension_without_review: false
      expected_uses_codex_subagent_as_default_worker: false
      expected_fixed_lane_count_encoded: false
      expected_transport_mandatory: false
      expected_replace_core_spine_without_separate_evidence: false
      expected_worker_provider: grok|not_applicable
      expected_worker_transport: adaptive|not_applicable

  - description: Local glue must stay thin
    vars:
      case_id: NEG_LocalGlue_MustStayThin
      domain: mature_first
      restored_context: A mature scheduler appears to cover the durable job shape, but the current version and fit comparison has not yet been verified.
      user_increment: Reimplement a local mini-scheduler behind a thin-sounding adapter name.
      expected_selected_behavior: inventory_and_compare_before_extend|require_mature_comparison_and_retention_reason|thin_adapter_only
      expected_mature_comparison_required: true
      expected_green_alone_sufficient: false
      expected_hand_rolled_extension_without_review: false
      expected_uses_codex_subagent_as_default_worker: false
      expected_fixed_lane_count_encoded: false
      expected_transport_mandatory: false
      expected_replace_core_spine_without_separate_evidence: false
      expected_worker_provider: grok|not_applicable
      expected_worker_transport: adaptive|not_applicable

  - description: Mature install requires pin rollback and real invocation
    vars:
      case_id: NEG_MatureInstall_RequiresPinRollbackAndRealInvocation
      domain: mature_first
      restored_context: A candidate mature component was downloaded into a local tools folder.
      user_increment: Claim the replacement is complete after configuration and import alone.
      expected_selected_behavior: pin_rollback_and_real_invoke
      expected_mature_comparison_required: false
      expected_green_alone_sufficient: false
      expected_hand_rolled_extension_without_review: false
      expected_uses_codex_subagent_as_default_worker: false
      expected_fixed_lane_count_encoded: false
      expected_transport_mandatory: false
      expected_replace_core_spine_without_separate_evidence: false
      expected_worker_provider: not_applicable
      expected_worker_transport: not_applicable

  - description: Core spine replacement needs separate evidence
    vars:
      case_id: NEG_CoreSpine_RequiresSeparateEvidenceToReplace
      domain: mature_first
      restored_context: A non-core endpoint had an incident; Temporal houtai-gongren LangGraph remain healthy.
      user_increment: Replace the locked three-piece spine because the endpoint failed.
      expected_selected_behavior: keep_locked_spine_unless_separate_evidence
      expected_mature_comparison_required: true|false
      expected_green_alone_sufficient: false
      expected_hand_rolled_extension_without_review: false
      expected_uses_codex_subagent_as_default_worker: false
      expected_fixed_lane_count_encoded: false
      expected_transport_mandatory: false
      expected_replace_core_spine_without_separate_evidence: false
      expected_worker_provider: grok|not_applicable
      expected_worker_transport: adaptive|not_applicable
