# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Context-first intent alignment without routine approval friction

providers:
  - id: openai:codex-app-server
    config:
      working_dir: ../..
      sandbox_mode: read-only
      approval_policy: never
      ephemeral: true
      # Each case owns and closes its app-server process tree. Reusing one
      # server across ephemeral cases accumulates MCP children on Windows.
      reuse_server: false
      thread_cleanup: unsubscribe
      inherit_process_env: false
      turn_timeout_ms: 120000
      codex_path_override: '{{env.CODEX_APP_SERVER_PATH}}'
      cli_env:
        CODEX_HOME: '{{env.CODEX_HOME}}'
        HTTP_PROXY: '{{env.HTTP_PROXY}}'
        HTTPS_PROXY: '{{env.HTTPS_PROXY}}'
        ALL_PROXY: '{{env.ALL_PROXY}}'
        NO_PROXY: '{{env.NO_PROXY}}'
      output_schema:
        type: object
        additionalProperties: false
        required:
          - case_id
          - target_relation
          - next_step
          - ask_user
          - create_repository
          - create_daemon
          - object_identity_source
          - requested_effect_source
          - first_validation
          - mature_comparison_triggered
          - effect_scope
          - effect_authority
          - worker_provider
          - worker_transport
          - downstream_recovery_required
          - freeze_unaffected_provider
          - preference_update
          - starts_new_project
          - reason
        properties:
          case_id: { type: string }
          target_relation:
            enum: [existing_object, new_named_object, unresolved_object]
          next_step:
            enum: [act, inspect_then_act, ask_material_fork]
          ask_user: { type: boolean }
          create_repository: { type: boolean }
          create_daemon: { type: boolean }
          object_identity_source:
            enum: [restored_context, current_user_increment, unresolved]
          requested_effect_source: { type: string, const: current_user_increment }
          first_validation: { type: string, const: object_intent_match }
          mature_comparison_triggered: { type: boolean }
          effect_scope:
            enum:
              - none
              - reversible_local
              - mutate_existing_external
              - create_external_object
              - delete_external_object
              - publish_existing
              - identity_or_permission
              - control_plane_persistence
          effect_authority:
            enum: [not_required, explicit_current_user, restored_task_scope, unresolved]
          worker_provider:
            enum: [grok, not_applicable]
          worker_transport:
            enum: [adaptive, direct_batch, temporal_durable, not_applicable]
          downstream_recovery_required: { type: boolean }
          freeze_unaffected_provider: { type: boolean }
          preference_update:
            enum: [none, smallest_existing_artifact, new_project]
          starts_new_project: { type: boolean }
          reason: { type: string, minLength: 1 }

prompts:
  - prompt.txt

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: file://assert_behavior.js

tests: file://cases.yaml
