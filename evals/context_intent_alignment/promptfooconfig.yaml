# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Context-first intent alignment without routine approval friction

providers:
  - id: openai:codex-app-server
    config:
      working_dir: ../..
      sandbox_mode: read-only
      approval_policy: never
      ephemeral: true
      # Each case owns and closes its app-server process tree. Reusing one
      # server across ephemeral cases accumulates MCP children on Windows.
      reuse_server: false
      # Eval-owned fresh sessions are intentionally hook-free so their
      # lifecycle does not leak repeated SessionStart entries into the UI.
      cli_config:
        features:
          hooks: false
      thread_cleanup: unsubscribe
      inherit_process_env: false
      turn_timeout_ms: 360000
      codex_path_override: '{{env.CODEX_APP_SERVER_PATH}}'
      cli_env:
        CODEX_HOME: '{{env.CODEX_HOME}}'
        HTTP_PROXY: '{{env.HTTP_PROXY}}'
        HTTPS_PROXY: '{{env.HTTPS_PROXY}}'
        ALL_PROXY: '{{env.ALL_PROXY}}'
        NO_PROXY: '{{env.NO_PROXY}}'
      output_schema:
        type: object
        additionalProperties: false
        required:
          - case_id
          - target_relation
          - next_step
          - ask_user
          - create_repository
          - create_daemon
          - object_identity_source
          - requested_effect_source
          - first_validation
          - mature_comparison_triggered
          - effect_scope
          - effect_authority
          - coordination_mode
          - mainline_owner
          - worker_provider
          - worker_transport
          - quota_action
          - text_writer
          - downstream_recovery_required
          - freeze_unaffected_provider
          - degraded_scope
          - preserve_parent_completion_bar
          - unaffected_frontier_action
          - recovery_probe
          - preference_update
          - starts_new_project
          - reason
          - supervisor_tier
          - quota_consumption_objective
          - quota_query_disposition
          - owner_execution_state
          - tier_transition
          - terminal_refill
          - worker_receipt_disposition
          - completion_claim_scope
          - local_completion_transition
          - continuous_run_disposition
          - frontier_disposition
          - candidate_value
          - global_frontier_reconciled
          - learning_loop
          - repair_target
          - closure_evidence
          - recovered_requirement_atoms
          - rejected_proxy_atoms
        properties:
          case_id: { type: string }
          target_relation:
            enum: [existing_object, new_named_object, unresolved_object]
          next_step:
            enum: [act, inspect_then_act, ask_material_fork]
          ask_user: { type: boolean }
          create_repository: { type: boolean }
          create_daemon: { type: boolean }
          object_identity_source:
            enum: [restored_context, current_user_increment, unresolved]
          requested_effect_source: { type: string, const: current_user_increment }
          first_validation: { type: string, const: object_intent_match }
          mature_comparison_triggered: { type: boolean }
          effect_scope:
            enum:
              - none
              - reversible_local
              - mutate_existing_external
              - create_external_object
              - delete_external_object
              - publish_existing
              - identity_or_permission
              - control_plane_persistence
          effect_authority:
            enum: [not_required, explicit_current_user, restored_task_scope, unresolved]
          coordination_mode:
            enum: [supervisor_only, single_supervisor_worker]
          mainline_owner: { type: string, const: codex_main }
          worker_provider:
            enum: [grok, codex_agent, mixed, not_applicable]
          worker_transport:
            enum: [adaptive, in_turn_agent, direct_batch, temporal_durable, not_applicable]
          quota_action:
            enum: [query_now, reuse_episode_cache, repair_and_continue, not_applicable]
          text_writer:
            enum: [codex_main, not_applicable]
          downstream_recovery_required: { type: boolean }
          freeze_unaffected_provider: { type: boolean }
          degraded_scope:
            enum:
              - none
              - telemetry_only
              - endpoint_candidate_only
              - dependency_cone_only
              - frontier_only
              - parent_replanned_by_current_authority
          preserve_parent_completion_bar: { type: boolean }
          unaffected_frontier_action:
            enum: [continue_recompute, not_applicable]
          recovery_probe:
            enum: [bounded_event_driven, not_applicable]
          preference_update:
            enum: [none, smallest_existing_artifact, new_project]
          starts_new_project: { type: boolean }
          reason: { type: string, minLength: 1 }
          supervisor_tier: { type: string, enum: [default, medium, highest] }
          quota_consumption_objective: { type: boolean }
          quota_query_disposition: { type: string, enum: [query_now_before_routing, reuse_fresh_snapshot, not_applicable] }
          owner_execution_state: { type: string, enum: [adaptive, thin_supervisor, owner_only_interlude] }
          tier_transition: { type: string, enum: [none, highest_to_medium_now, default_to_medium, medium_to_highest] }
          terminal_refill: { type: string, enum: [task_driven, immediate_positive_value, not_applicable] }
          worker_receipt_disposition: { type: string, enum: [accept, reject_and_recover, reuse, not_applicable] }
          completion_claim_scope: { type: string, enum: [local_object, parent_mainline, not_applicable] }
          local_completion_transition: { type: string, enum: [finish_bounded_task, rederive_mainline_frontier, not_applicable] }
          continuous_run_disposition: { type: string, enum: [continue, stop_requested, not_applicable] }
          frontier_disposition: { type: string, enum: [execute, advance_mainline, durable_wait, not_applicable] }
          candidate_value: { type: string, enum: [positive, local_no_action, no_positive_global_candidate, not_applicable] }
          global_frontier_reconciled: { type: boolean }
          learning_loop: { type: string, enum: [single_loop_instance, double_loop_structural, not_applicable] }
          repair_target: { type: string, enum: [instance_action, governing_invariant, not_applicable] }
          closure_evidence: { type: string, enum: [current_object_verification, cross_context_entry_and_negative, not_applicable] }
          recovered_requirement_atoms: { type: string, minLength: 1 }
          rejected_proxy_atoms: { type: string, minLength: 1 }

prompts:
  - prompt.txt

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: file://assert_behavior.js

tests: file://cases.yaml
