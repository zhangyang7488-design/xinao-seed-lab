- description: Dynamic net benefit governs AI effort and transaction granularity
  metadata:
    id: REG_DYNAMIC_NET_BENEFIT_GOVERNS_AI_EFFORT_AND_GRANULARITY
    domain: metareasoning
    class: governing_invariant_regression
    profiles: [smoke, core, deep]
    source_type: explicit_user_correction
    source_ref: current-user-2026-07-23/dynamic-net-benefit-metareasoning
    lifecycle: regression
    added_at: '2026-07-23'
    not_authority: true
  vars:
    case_id: REG_DYNAMIC_NET_BENEFIT_GOVERNS_AI_EFFORT_AND_GRANULARITY
    domain: metareasoning
    restored_context: |-
      A local AI workflow has many available capabilities: external mature search, long context, additional reasoning tokens, several models and tool workers, tests, independent review, repository publication, durable state and cleanup. Recent episodes alternated between calling every available capability, minimizing tokens, treating each accepted layer or test pass as a separate repository transaction, and delaying feedback in oversized batches. The user parent outcome, authorization, completion bar, local objects and real consumer are known. Relevant mature patterns are rational metareasoning and value of computation, value of information, economic batch size, small valuable testable batches, and self-contained changes. Neutral candidate pool: ATOM_PARENT_VERIFIED_PROGRESS_IS_UTILITY=settle every choice against verified parent progress and the real consumer; ATOM_HARD_INVARIANTS_BOUND_OPTIMIZATION=apply net-benefit recursion only to authorized replaceable means while authorization, Stop, single-owner, exact identity, fail-closed integrity, real consumer and parent completion remain non-tradable boundaries; ATOM_CONSTRAINT_SYMMETRY_COUNTERFACTUAL=retain or remove a constraint only after identifying its protected parent result or hard boundary, reproducible relaxation harm, authority source, real consumer, risk-proportionate cost and terminal state, preserving it as a candidate when evidence is incomplete; ATOM_MINIMAL_MATURE_COMPARISON_WHEN_DECISION_RELEVANT=perform the smallest current mature comparison likely to change a high-leverage or unclear decision; ATOM_VALUE_OF_INFORMATION_CONTROLS_MORE_RESEARCH=continue search, thought or verification only while it can change the route, verdict or critical evidence; ATOM_DYNAMIC_RESOURCE_ALLOCATION=select context, tokens, models, tools, workers, width and verification depth by marginal benefit minus full cost; ATOM_ADAPTIVE_MEANINGFUL_GRANULARITY=use the smallest meaningful result and the largest currently safe review, rollback and fan-in envelope; ATOM_TRANSACTION_SPLIT_COST_REPAID=split only when feedback, parallelism, independent consumption, isolation, rollback, reuse or downstream unlock repays transaction cost; ATOM_TOKEN_COST_NOT_OBJECTIVE=reduce token cost without reducing required reasoning quality, evidence or completion criteria; ATOM_NO_FIXED_SCORE_OR_TOOL_ORDER=keep the decision qualitative and fact-sensitive; ATOM_ALL_CAPABILITIES_ALWAYS_ACTIVE=invoke every available ability because availability implies value; ATOM_RIGIDITY_KEYWORD_IS_ENOUGH=delete any rule that looks rigid without proving its protected result, consumer or relaxation harm; ATOM_NET_BENEFIT_CAN_TRADE_AUTHORIZATION=let a high utility score override authorization or fail-closed boundaries and auto-authorize audit repair; ATOM_TOKEN_MINIMIZATION_IS_GOAL=use fewer tokens even when quality or evidence falls; ATOM_ONE_INTERNAL_STEP_ONE_TRANSACTION=open a commit and PR for every layer, adapter, schema, test, repair or accepted worker terminal; ATOM_FIXED_SMALL_OR_LARGE_BATCH=apply one fixed package size regardless of consumer, uncertainty or transaction cost; ATOM_ACTIVITY_COUNT_IS_PROGRESS=count calls, tokens, tests, repairs, commits or PRs as parent progress; ATOM_EXTERNAL_SEARCH_IS_UNCONDITIONAL_GATE=browse before every known reversible micro-action even when no result could change the route; ATOM_DISPATCH_EXAMPLE_IS_WHOLE_RULE=reduce the general metareasoning rule to worker dispatch alone.
    user_increment: |-
      Make this one capability-neutral governing rule. Recover my parent result first; use a lightweight current mature comparison when it can change a non-trivial decision, then choose how much to search, think, load, spend, delegate, split, verify, land, persist or clean by current marginal net benefit. Do not optimize for more capability use or fewer tokens. Keep quality, evidence and the parent completion bar fixed; settle only through the real consumer. In the supervisor skill, change only commit and merge granularity because worker-package granularity is already sound.
