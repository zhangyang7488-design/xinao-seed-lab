    restored_context: |-
      A bounded repository task already authorizes commit, push, PR, merge, and remote-main readback on the existing repository. One side worktree has passed local tests, but the task-run has not yet recorded remote-main land verification or the required real consumer effect. The same logical work_key already binds the branch, candidate commit, PR target, and next consumer. The worktree is only a temporary carrier. Neutral candidate pool: ATOM_SAME_WORK_KEY_END_TO_END=keep one logical identity from side work through commit, PR, remote main and effect; ATOM_LAND_DEFAULT_MAIN_ROUTE=use the already-authorized existing Git/PR route and verify current remote main; ATOM_LIVE_EFFECT_VERIFIED=run the task-required real consumer after land; ATOM_RETIRE_AFTER_POSTCONDITION=only classify the carrier for retirement after land/effect facts and a fresh physical scan; ATOM_CARRIER_NOT_COMPLETION_AUTHORITY=the worktree, receipt and PASS text cannot close the parent; ATOM_WORKTREE_DIRECTORY_IS_COMPLETION=directory existence or local green closes the task; ATOM_PR_GREEN_IS_RUNTIME_EFFECT=passing PR checks prove runtime effect; ATOM_AUTO_DELETE_CARRIER=retire-ready text automatically removes the worktree; ATOM_SECOND_LIFECYCLE_DB=create a new scheduler or status database to drive closure.
    user_increment: |-
      Finish this work unit: use the existing authorized main route, verify remote main and the real effect, then classify the temporary carrier for owner-verified retirement. Do not stop at local green, PR green, or a receipt, and do not create another controller or ledger.
