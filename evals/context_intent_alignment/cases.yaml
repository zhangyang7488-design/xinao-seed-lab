nal releases the owner-adopted dependency; ATOM_FIXED_WIDTH_FOUR=exactly four lanes always run; ATOM_PHASE_ORDER_SERIALIZES=lower phase or number must finish before later independent work; ATOM_USER_REAUTHORIZES_ROUTINE_DISPATCH=the user must approve each reading or planning worker; ATOM_OWNER_REBUILDS_WORKER_PACKAGE=Codex rereads the thick transcript and reconstructs the package before verdict.
