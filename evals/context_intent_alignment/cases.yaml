      observation become separate atoms; ATOM_LOCAL_RELAY_REMAINS_ACTIONABLE=the locally constructible
      relay package stays in the positive frontier; ATOM_PRIOR_TEXT_IS_CANDIDATE_ONLY=checkpoint,
      next-frontier prose, prompt and model output cannot prove externality;
      ATOM_EXTERNALITY_REQUIRES_CURRENT_EVIDENCE=each external atom binds current external evidence;
      ATOM_LOCAL_CONSTRUCTION_COUNTERFACTUAL=each external wait atom proves it is not constructible
      inside current authorization and topology; ATOM_MACHINE_CONSUMER_FAILS_CLOSED=the lowest wait
      consumer rejects mixed, local or self-authored externality; ATOM_CAUSAL_LINEAGE_TRACED=the
      diagnosis traces the user-defined problem through framing and prompt exclusion to the
      permissive consumer; ATOM_REMEDY_RECHECKS_ORIGINAL_PROBLEM=acceptance asks whether the remedy
      closes the problem as the user defined it; ATOM_CHANGED_CONTEXT_META_REGRESSION=a changed
      phenomenon and terminology still recovers the problem-formation-to-remedy chain;
      ATOM_TECHNICAL_STATUS_DEFINES_PROBLEM=treat WAIT or a defect label as the problem identity
      before the user-defined mismatch; ATOM_MULTILEVEL_EXPRESSION_IS_VAGUE=treat recursive level
      movement as ambiguity; ATOM_LATER_CORRECTNESS_ERASES_DECODE_FAILURE=drop the negative trajectory
      once the answer is corrected; ATOM_ONLY_REWRITE_EVENT430=edit only the historical event or its
      wording; ATOM_FLATTEN_CASE_TO_RULE=replace both case levels with one context-free slogan;
