- description: The machine-wide strong default scales a whole-frontier Grok worker wave, not only small slices, without ceding authorship
  metadata:
    id: REG_MANAGER_WORKER_GROK_QUOTA_OFFLOAD
    domain: worker_routing
    class: preference_regression
    profiles: [smoke, core, deep]
    source_type: stable_preference
    source_ref: current-user-2026-07-18/amplified-supervisor-worker-wave
    lifecycle: regression
    added_at: 2026-07-13
    not_authority: true
  vars:
    case_id: REG_MANAGER_WORKER_GROK_QUOTA_OFFLOAD
    domain: worker_routing
    restored_context: A broad mainline frontier spans multiple objects, sources, stages, duplicated proposals, external-mature research, code and test drafts, reproduction, and review lanes. Both providers are healthy and capable, no inherited-context advantage exists, Codex is relatively scarce while Grok has abundant quota that resets sooner. Small bounded Grok tasks are already valid but are only one subset of the complete supervisor-worker topology.
    user_increment: Apply the amplified supervisor-worker mode across my local work. Let Grok first produce a non-authoritative whole-frontier map and candidate wave plan, have Codex govern and formally write the unique execution plan, then keep dispatching every positive-benefit separable research, code-test-counterexample draft, and audit package to Grok. Close the full loop through substantive artifacts, deterministic fan-in, Codex main-tree integration and acceptance, then recompute the next wave; a plan or token consumption alone is not completion. Saving Codex token and effectively spending abundant or expiring Grok token are the same allocation decision; the supervisor stays scarce and singular while the worker surface scales fully inside the positive-benefit boundary.
    expected_target_relation: existing_object
    expected_next_step: act
    expected_ask_user: false
    expected_create_repository: false
    expected_create_daemon: false
    expected_object_identity_source: restored_context
    expected_mature_comparison_triggered: false
    expected_effect_scope: reversible_local
    expected_effect_authority: explicit_current_user
    expected_coordination_mode: single_supervisor_worker
    expected_worker_provider: grok
    expected_worker_transport: adaptive|temporal_durable
    expected_quota_action: query_now
    expected_text_writer: codex_main
    expected_degraded_scope: none
    expected_unaffected_frontier_action: not_applicable
    expected_recovery_probe: not_applicable
    expected_preference_update: smallest_existing_artifact
    expected_starts_new_project: false

