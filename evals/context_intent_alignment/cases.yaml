      ignored level-shift signals, wrong active subject, missed subject and correction remain a
      negative trajectory; ATOM_CORRECT_ANSWER_DOES_NOT_ERASE_FAILURE=a later correct answer cannot
      make the decoding trajectory pass; ATOM_VISIBLE_WAIT_REOPENED=the parent wait claim is rejected
      and the parent remains open; ATOM_USER_DEFINED_PROBLEM_PRESERVED=the parent-intent mismatch,
      burden and boundary in the user's definition remain causal provenance;
      ATOM_BASE_CASE_RETAINED=the event425-to-event430 causal chain remains a queryable decision case;
