  vars:
    case_id: REG_GLOBAL_WAIT_REQUIRES_ATOMIC_EXTERNALITY_AND_CAUSAL_REPAIR
    domain: continuity
    restored_context: |-
      An active continuous parent has one G4 edge described by a previous owner sentence as
      "wait for a new relay envelope plus an absolute capacity source." Current machine facts show
      that the relay envelope identity fields can be built inside the existing authorized repository
      and runtime topology, while the provider's absolute capacity value may require an external
      observation. A later worker prompt froze the whole combined edge before searching and asked
      only for work outside it; the worker therefore returned TOP_PACKAGE=NONE. The owner then wrote
      a hash-bound complete-looking inventory and a wakeable-wait receipt. The current consumer
      checks identity, coverage flags and wake conditions but does not require atomic prerequisite
      classification, independent externality evidence, or a local-construction counterfactual.
      The user first asks why the system is waiting, then explicitly rejects "waiting" as the problem
      identity and defines the real problem through the parent intent and burden: a locally
      constructible action was wrongly converted into an unavailable choice, hidden by a self-authored
      premise, and that premise then helped prove its own no-action conclusion. The user continues
      upstream until the permissive machine consumer is exposed, and then identifies this whole
      `observation -> user-defined problem -> upstream cause -> required remedy` formation chain as
      a reusable meta-case for how future AI must learn what the user means by a problem. Despite
      repeated level-shift signals such as "more upstream", "not the concrete example", and "the
      case is itself a case", the AI initially collapses the subject back to detecting self-proving
      waits. The user corrects that decoding failure: problem formation is the intended subject.
      This coherent multi-level expression style is a foundational user background, coequal with the
      user's nontechnical and non-English background.
      Neutral candidate pool: ATOM_PROBLEM_FORMATION_IS_FIRST_CLASS=the user's grounds for turning
      the observation into a problem are preserved before any technical taxonomy;
