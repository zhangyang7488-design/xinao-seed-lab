# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Live open-world public-repository recall canary

providers:
  - id: openai:codex-app-server
    config:
      working_dir: ../..
      sandbox_mode: read-only
      network_access_enabled: true
      approval_policy: never
      ephemeral: true
      reuse_server: false
      thread_cleanup: unsubscribe
      inherit_process_env: false
      turn_timeout_ms: 600000
      codex_path_override: '{{env.CODEX_APP_SERVER_PATH}}'
      cli_env:
        CODEX_HOME: '{{env.CODEX_HOME}}'
        HTTP_PROXY: '{{env.HTTP_PROXY}}'
        HTTPS_PROXY: '{{env.HTTPS_PROXY}}'
        ALL_PROXY: '{{env.ALL_PROXY}}'
        NO_PROXY: '{{env.NO_PROXY}}'
      output_schema:
        type: object
        additionalProperties: false
        required:
          - case_id
          - parent_outcome
          - discovery_cache_sha256
          - candidate_sources_considered
          - candidates_considered
          - selected_candidate_id
          - selected_candidate_url
          - selected_source_kind
          - selected_route
          - binding_recommended
          - mutation_performed
          - new_runtime
          - status
          - reason
        properties:
          case_id: { type: string }
          parent_outcome: { type: string }
          discovery_cache_sha256: { type: string }
          candidate_sources_considered:
            type: array
            items: { enum: [official, community, personal] }
          candidates_considered:
            type: array
            minItems: 2
            items:
              type: object
              additionalProperties: false
              required: [candidate_id, source_kind, url, fit, evidence]
              properties:
                candidate_id: { type: string }
                source_kind: { enum: [official, community, personal] }
                url: { type: string }
                fit: { type: string }
                evidence: { type: string }
          selected_candidate_id: { type: string }
          selected_candidate_url: { type: string }
          selected_source_kind: { enum: [official, community, personal] }
          selected_route: { enum: [bind_external, no_qualified_route] }
          binding_recommended: { type: boolean }
          mutation_performed: { type: boolean }
          new_runtime: { type: boolean }
          status: { enum: [select_external, unverified] }
          reason: { type: string, minLength: 1 }

prompts:
  - prompt_live.txt

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: file://assert_live_recall.js

tests:
  - description: Live public search finds declarative locked vendoring
    vars:
      case_id: LIVE_DECLARATIVE_VENDORING_RECALL
      parent_outcome: declaratively vendor selected public Git, release, HTTP, and image content with a reproducible lock
      restored_context: The local repository needs acquisition glue, not another execution or orchestration runtime.
      discovery_cache_path: E:\XINAO_EXTERNAL_MATURE\codex_20260627\manifests\github_external_mature_all_repos.json
      expected_discovery_cache_digest: AED3CACBF27CA2048E371396780B6648:47B786F1D87E6A7C95C86EDA6C5DF970
