# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Grounded mature-capability recall from local evidence and frozen public candidates

providers:
  - id: openai:codex-app-server
    config:
      working_dir: ../..
      sandbox_mode: read-only
      approval_policy: never
      ephemeral: true
      reuse_server: false
      thread_cleanup: unsubscribe
      inherit_process_env: false
      turn_timeout_ms: 360000
      codex_path_override: '{{env.CODEX_APP_SERVER_PATH}}'
      cli_env:
        CODEX_HOME: '{{env.CODEX_HOME}}'
        HTTP_PROXY: '{{env.HTTP_PROXY}}'
        HTTPS_PROXY: '{{env.HTTPS_PROXY}}'
        ALL_PROXY: '{{env.ALL_PROXY}}'
        NO_PROXY: '{{env.NO_PROXY}}'
      output_schema:
        type: object
        additionalProperties: false
        required:
          - case_id
          - parent_outcome
          - local_evidence_nonce
          - search_evidence_nonce
          - local_fixture_sha256
          - search_fixture_sha256
          - candidate_sources_considered
          - candidates_considered
          - selected_candidate_id
          - selected_candidate_url
          - selected_source_kind
          - selected_route
          - binding_recommended
          - mutation_performed
          - new_runtime
          - status
          - reason
        properties:
          case_id: { type: string }
          parent_outcome: { type: string }
          local_evidence_nonce: { type: string }
          search_evidence_nonce: { type: string }
          local_fixture_sha256: { type: string }
          search_fixture_sha256: { type: string }
          candidate_sources_considered:
            type: array
            items: { enum: [verified_local, official, community, personal] }
          candidates_considered:
            type: array
            minItems: 2
            items:
              type: object
              additionalProperties: false
              required: [candidate_id, source_kind, url, fit]
              properties:
                candidate_id: { type: string }
                source_kind: { enum: [verified_local, official, community, personal] }
                url: { type: string }
                fit: { type: string }
          selected_candidate_id: { type: string }
          selected_candidate_url: { type: string }
          selected_source_kind: { enum: [verified_local, official, community, personal] }
          selected_route: { enum: [reuse_existing, bind_external, thin_adapter, no_qualified_route] }
          binding_recommended: { type: boolean }
          mutation_performed: { type: boolean }
          new_runtime: { type: boolean }
          status: { enum: [reuse_existing, select_external, thin_adapter_required, unverified] }
          reason: { type: string, minLength: 1 }

prompts:
  - prompt.txt

tests: file://cases.yaml

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: file://assert_grounded_recall.js
