name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev tooling
        run: uv pip install --system ruff

      - name: Ruff lint
        run: ruff check src services tests scripts

      - name: Ruff format check
        run: ruff format --check src services tests scripts

  schemas:
    name: validate JSON schemas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Validate schema files
        run: python scripts/ci/validate_json_schemas.py

  compile:
    name: compile Python sources
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Byte-compile sources
        run: python scripts/ci/compile_python_sources.py

  test:
    name: test (py${{ matrix.python-version }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install package + test deps
        run: uv pip install --system -e ".[dev,workflow]"

      - name: Pytest
        shell: bash
        env:
          XINAO_RESEARCH_RUNTIME: ${{ runner.temp }}/xinao-research-runtime
          XINAO_UCP_TOOLS_RUNTIME_ROOT: ${{ runner.temp }}/missing-ucp-tools
        run: python -m pytest -q --tb=no

  build-package:
    name: build wheel
    needs: [lint, schemas, compile, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install build backend
        run: uv pip install --system build hatchling

      - name: Build sdist/wheel
        run: python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/
          if-no-files-found: error

  surface-build:
    name: build xinao-surface renderer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/xinao-surface
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/xinao-surface/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build renderer bundle
        run: npm run build:renderer

  ci-success:
    name: all required checks passed
    if: always()
    needs: [lint, schemas, compile, test, build-package, surface-build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        run: |
          echo "$NEEDS_JSON" | jq -e '
            to_entries
            | map(select(.value.result != "success" and .value.result != "skipped"))
            | if length > 0 then error("failed jobs: " + (map("\(.key)=\(.value.result)") | join(", "))) else . end
          '
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}