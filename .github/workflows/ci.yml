name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install bounded test environment
        run: uv sync --frozen --extra dev --extra workflow

      - name: Ruff lint
        run: uv run ruff check services scripts tests

      - name: Ruff format check
        run: uv run ruff format --check services scripts tests

      - name: Compile retained Python
        run: uv run python -m compileall -q services scripts tests

      - name: Run bounded tests
        run: uv run pytest -q
