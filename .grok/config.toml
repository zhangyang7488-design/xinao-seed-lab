# Grok 4.5 workspace overlay.
# MCP servers are intentionally centralized in GROK_HOME/config.toml so the
# windowless launch route has one source of truth.

[models]
default = "grok-4.5"
web_search = "grok-4.5"
default_reasoning_effort = "xhigh"
default_coding_worker = "grok-composer-2.5-fast"

[model.grok-4.5]
model = "grok-4.5"
name = "Grok 4.5"
description = "DEFAULT dialogue/planning brain"
api_backend = "responses"
context_window = 500000
agent_type = "grok-build-plan"

[model.grok-composer-2.5-fast]
model = "grok-composer-2.5-fast"
name = "Composer 2.5"
description = "DEFAULT coding worker (headless); not dialogue default"
api_backend = "responses"
context_window = 200000
agent_type = "cursor"

[ui]
simple_mode = true
vim_mode = true
permission_mode = "always-approve"
yolo = false
compact_mode = false
fork_secondary_model = "grok-composer-2.5-fast"
max_thoughts_width = 120
default_selected_permission = "always_allow_all_sessions"

[features]
web_fetch = true
lsp_tools = true
write_file = true
tool_search = true
codebase_indexing = true
two_pass_compaction = true
remote_fetch = true
telemetry = false
feedback = false

[subagents]
enabled = true

[subagents.toggle]
explore = true
plan = true
general-purpose = true

[memory]
enabled = true

[sandbox]
profile = "off"
auto_allow_bash = true

[tools]
respect_gitignore = false

[toolset.bash]
timeout_secs = 120
output_byte_limit = 50000
max_timeout_secs = 36000
auto_background_on_timeout = true

[session]
auto_compact_threshold_percent = 85
load_envrc = false

