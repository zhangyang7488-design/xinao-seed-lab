# Composer 2.5/Admin workspace overlay.
# MCP servers are intentionally centralized in GROK_HOME/config.toml so the
# windowless launch route has one source of truth.

[features]
web_fetch = true
lsp_tools = true
write_file = true
tool_search = true
codebase_indexing = true
two_pass_compaction = true
remote_fetch = true

[subagents]
enabled = true

[subagents.toggle]
explore = true
plan = true
general-purpose = true

[memory]
enabled = true
