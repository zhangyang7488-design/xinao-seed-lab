# Grok 4.5 workspace overlay.
# MCP servers are intentionally centralized in GROK_HOME/config.toml so the
# windowless launch route has one source of truth.

[models]
default = "grok-4.5"
web_search = "grok-4.5"
default_reasoning_effort = "xhigh"
default_coding_worker = "grok-4.5"

[model.grok-4.5]
model = "grok-4.5"
name = "Grok 4.5"
description = "DEFAULT dialogue/planning brain"
api_backend = "responses"
context_window = 500000
agent_type = "grok-build-plan"

[ui]
simple_mode = true
vim_mode = true
yolo = false
compact_mode = false
fork_secondary_model = "grok-4.5"
max_thoughts_width = 120

[features]
web_fetch = true
lsp_tools = true
write_file = true
tool_search = true
codebase_indexing = true
two_pass_compaction = true
remote_fetch = true
telemetry = false
feedback = false

[subagents]
enabled = true

[subagents.toggle]
explore = true
plan = true
general-purpose = true

[memory]
enabled = true

[tools]
respect_gitignore = true

[session]
auto_compact_threshold_percent = 85
load_envrc = false
